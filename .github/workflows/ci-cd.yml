name: CI/CD Pipeline

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install --no-cache-dir uv

      - name: Install dependencies
        run: |
          uv venv
          . .venv/bin/activate
          deepagents_spec=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          deps = data["project"]["dependencies"]
          dev = data["project"]["optional-dependencies"]["dev"]

          def is_deepagents_cli(dep: str) -> bool:
              return dep.strip().startswith("deepagents-cli")

          filtered = [d for d in deps if not is_deepagents_cli(d)]
          Path("/tmp/nanobot-deps.txt").write_text("\n".join(filtered + dev))
          deepagents = next((d for d in deps if is_deepagents_cli(d)), "deepagents-cli")
          print(deepagents)
          PY
          )
          xargs -r -a /tmp/nanobot-deps.txt uv pip install -c constraints.txt
          uv pip install -e ".[dev]" --no-deps
          uv pip install --no-deps "$deepagents_spec"

      - name: Run tests with coverage
        run: |
          . .venv/bin/activate
          pytest tests/ -v \
            --cov=nanobot_deep \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=80 || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install --no-cache-dir uv

      - name: Install dependencies
        run: |
          uv venv
          . .venv/bin/activate
          deepagents_spec=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          deps = data["project"]["dependencies"]
          dev = data["project"]["optional-dependencies"]["dev"]

          def is_deepagents_cli(dep: str) -> bool:
              return dep.strip().startswith("deepagents-cli")

          filtered = [d for d in deps if not is_deepagents_cli(d)]
          Path("/tmp/nanobot-deps.txt").write_text("\n".join(filtered + dev))
          deepagents = next((d for d in deps if is_deepagents_cli(d)), "deepagents-cli")
          print(deepagents)
          PY
          )
          xargs -r -a /tmp/nanobot-deps.txt uv pip install -c constraints.txt
          uv pip install -e ".[dev]" --no-deps
          uv pip install --no-deps "$deepagents_spec"

      - name: Run ruff check
        run: |
          . .venv/bin/activate
          ruff check nanobot_deep/ || true

      - name: Run ruff format check
        run: |
          . .venv/bin/activate
          ruff format --check nanobot_deep/ || true

  versioning:
    name: Semantic Versioning
    needs: [test, lint]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      is_prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Version
        uses: paulhatch/semantic-version@v5.4.0
        id: version
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "/^feat(\\(.+\\))?:/"
          version_format: "${major}.${minor}.${patch}"
          search_commit_body: true
          bump_each_commit: true
          bump_each_commit_patch_pattern: "/^fix(\\(.+\\))?:/"
          user_format_type: "csv"

      - name: Check if prerelease
        id: check_prerelease
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Display version
        run: |
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Version Tag: ${{ steps.version.outputs.version_tag }}"
          echo "Is Prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}"

  sync_version:
    name: Sync Package Version
    needs: versioning
    runs-on: ubuntu-latest
    outputs:
      version_synced: ${{ steps.sync.outputs.version_synced }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync version files
        id: sync
        env:
          VERSION: ${{ needs.versioning.outputs.version }}
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "version_synced=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"].strip()

          def update(path: Path, pattern: str, replacement: str) -> bool:
            text = path.read_text(encoding="utf-8")
            new_text, count = re.subn(pattern, replacement, text, count=1, flags=re.M)
            if count == 0:
              raise SystemExit(f"Pattern not found in {path}")
            if new_text != text:
              path.write_text(new_text, encoding="utf-8")
              return True
            return False

          changed = False
          changed |= update(Path("pyproject.toml"), r'^\s*version\s*=\s*"[^"]+"', f'version = "{version}"')
          changed |= update(Path("nanobot_deep/__init__.py"), r'^__version__\s*=\s*"[^"]+"', f'__version__ = "{version}"')
          print(f"Version sync changed files: {changed}")
          PY

          if git diff --quiet; then
            echo "version_synced=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml nanobot_deep/__init__.py
          git commit -m "chore(release): sync version ${VERSION}"
          git push
          echo "version_synced=true" >> $GITHUB_OUTPUT

  docker-build-amd64:
    name: Build & Push Docker Image (amd64)
    needs: [versioning, sync_version]
    if: needs.sync_version.outputs.version_synced == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || (github.ref == 'refs/heads/main' && 'main' || github.ref) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repository name
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Generate Docker tags
        id: docker_tags
        run: |
          VERSION="${{ needs.versioning.outputs.version }}"
          REPO="ghcr.io/${{ steps.repo.outputs.name }}"
          ARCH="amd64"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tags=${REPO}:${VERSION}-${ARCH},${REPO}:latest-${ARCH}" >> $GITHUB_OUTPUT
          else
            BRANCH=$(echo "${{ github.head_ref || github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            echo "tags=${REPO}:${VERSION}-${ARCH},${REPO}:${BRANCH}-${ARCH}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.docker_tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-arm64:
    name: Build & Push Docker Image (arm64)
    needs: [versioning, sync_version]
    if: needs.sync_version.outputs.version_synced == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || (github.ref == 'refs/heads/main' && 'main' || github.ref) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repository name
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Generate Docker tags
        id: docker_tags
        run: |
          VERSION="${{ needs.versioning.outputs.version }}"
          REPO="ghcr.io/${{ steps.repo.outputs.name }}"
          ARCH="arm64"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tags=${REPO}:${VERSION}-${ARCH},${REPO}:latest-${ARCH}" >> $GITHUB_OUTPUT
          else
            BRANCH=$(echo "${{ github.head_ref || github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            echo "tags=${REPO}:${VERSION}-${ARCH},${REPO}:${BRANCH}-${ARCH}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.docker_tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.version=${{ needs.versioning.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-manifest:
    name: Create Multi-Arch Docker Manifest
    needs: [docker-build-amd64, docker-build-arm64, versioning, sync_version]
    if: needs.sync_version.outputs.version_synced == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repository name
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Create multi-arch tags
        run: |
          VERSION="${{ needs.versioning.outputs.version }}"
          REPO="ghcr.io/${{ steps.repo.outputs.name }}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker buildx imagetools create -t "${REPO}:${VERSION}" \
              "${REPO}:${VERSION}-amd64" "${REPO}:${VERSION}-arm64"
            docker buildx imagetools create -t "${REPO}:latest" \
              "${REPO}:latest-amd64" "${REPO}:latest-arm64"
          else
            BRANCH=$(echo "${{ github.head_ref || github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            docker buildx imagetools create -t "${REPO}:${VERSION}" \
              "${REPO}:${VERSION}-amd64" "${REPO}:${VERSION}-arm64"
            docker buildx imagetools create -t "${REPO}:${BRANCH}" \
              "${REPO}:${BRANCH}-amd64" "${REPO}:${BRANCH}-arm64"
          fi

  update-docker-compose:
    name: Update docker-compose.yml
    needs: [docker-manifest, versioning, sync_version]
    if: github.ref == 'refs/heads/main' && needs.versioning.outputs.is_prerelease == 'false' && needs.sync_version.outputs.version_synced == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install yq
        run: pip install --no-cache-dir yq

      - name: Update image tag in docker-compose.yml
        env:
          VERSION: ${{ needs.versioning.outputs.version }}
        run: |
          yq -i '.services.nanobot-deep.image = "ghcr.io/gthieleb/nanobot-deep:'"$VERSION"'"' docker-compose.yml

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git commit -m "chore(deps): update docker-compose.yml to v${{ needs.versioning.outputs.version }}"
          git push

  release:
    name: Create GitHub Release
    needs: [update-docker-compose, versioning]
    if: github.ref == 'refs/heads/main' && needs.versioning.outputs.is_prerelease == 'false' && needs.sync_version.outputs.version_synced == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref == 'refs/heads/main' && 'main' || github.ref }}

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -50)
          else
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract repository name
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.versioning.outputs.version }}
          name: Release v${{ needs.versioning.outputs.version }}
          target_commitish: main
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Docker Image
            ```bash
            docker pull ghcr.io/${{ steps.repo.outputs.name }}:${{ needs.versioning.outputs.version }}
            ```
          draft: false
          prerelease: false

  auto-merge:
    name: Auto-merge PR
    needs: [test, lint]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}" || echo "Auto-merge not available"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
